<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }

header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.post, .card {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
  padding:10px;
}

img { width:100%; border-radius:10px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* SETTINGS */
#settings {
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:100%;
  background:white;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input { padding:10px; margin:5px; }
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <button onclick="openSettings()">⚙️</button>
</header>

<!-- FEED -->
<div id="feed"></div>

<!-- SWIPE -->
<div id="discover" style="display:none">
  <div id="card" class="card"></div>
  <button onclick="likeUser()">❤️</button>
  <button onclick="skipUser()">❌</button>
</div>

<!-- MESSAGES -->
<div id="messages" style="display:none">
  <div id="chat"></div>
  <input id="msg">
  <button onclick="sendMsg()">Envoyer</button>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
  <h3>Mon Profil</h3>
  <div id="myPosts"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showDiscover()">🔥</button>
  <button onclick="showMessages()">💬</button>
  <button onclick="showProfile()">👤</button>
</div>

<!-- SETTINGS -->
<div id="settings">
  <h2>Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="signup()">Créer</button>
  <button onclick="login()">Connexion</button>
  <button onclick="closeSettings()">Fermer</button>
</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= FEED =================
function loadFeed(){
  db.collection("posts").onSnapshot(snap=>{
    if(snap.empty){
      feed.innerHTML = `
        <div class="post"><img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74"><p>Sophie</p></div>
      `;
      return;
    }

    feed.innerHTML="";
    snap.forEach(doc=>{
      let p = doc.data();
      feed.innerHTML += `<div class="post"><img src="${p.img}"><p>${p.email}</p></div>`;
    });
  });
}

// ================= USERS =================
let users = [];
let index = 0;

function loadUsers(){
  db.collection("users").get().then(snap=>{
    users=[];
    snap.forEach(doc=>{
      if(doc.id !== auth.currentUser?.uid){
        users.push({id:doc.id, ...doc.data()});
      }
    });
    showUser();
  });
}

function showUser(){
  if(users.length === 0) return;
  let u = users[index];

  card.innerHTML = `
    <img src="${u.photo || 'https://via.placeholder.com/300'}">
    <h2>${u.name || 'Sportif'}</h2>
    <p>${u.sport || 'Sport'}</p>
  `;
}

// ================= MATCH =================
function likeUser(){
  if(!auth.currentUser) return alert("Connecte-toi");

  let target = users[index];

  db.collection("likes").add({
    from: auth.currentUser.uid,
    to: target.id
  });

  // check match
  db.collection("likes")
  .where("from","==",target.id)
  .where("to","==",auth.currentUser.uid)
  .get()
  .then(snap=>{
    if(!snap.empty){
      alert("🔥 MATCH !");
      db.collection("matches").add({
        users:[auth.currentUser.uid, target.id]
      });
    }
  });

  nextUser();
}

function skipUser(){ nextUser(); }

function nextUser(){
  index++;
  if(index >= users.length) index=0;
  showUser();
}

// ================= MESSAGES =================
function sendMsg(){
  if(!auth.currentUser) return;

  db.collection("messages").add({
    text: msg.value,
    user: auth.currentUser.uid
  });
}

db.collection("messages").onSnapshot(snap=>{
  chat.innerHTML="";
  snap.forEach(doc=>{
    let m = doc.data();
    chat.innerHTML += `<p>${m.user}: ${m.text}</p>`;
  });
});

// ================= PROFILE =================
function loadProfile(){
  if(!auth.currentUser) return;

  db.collection("posts")
  .where("user","==",auth.currentUser.uid)
  .onSnapshot(snap=>{
    myPosts.innerHTML="";
    snap.forEach(doc=>{
      let p = doc.data();
      myPosts.innerHTML += `<div class="post"><img src="${p.img}"></div>`;
    });
  });
}

// ================= AUTH =================
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      name:"Nouveau",
      sport:"Sport"
    });
  });
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>closeSettings());
}

function openSettings(){ settings.style.display="flex"; }
function closeSettings(){ settings.style.display="none"; }

// ================= NAV =================
function showFeed(){
  feed.style.display="block";
  discover.style.display="none";
  messages.style.display="none";
  profile.style.display="none";
}

function showDiscover(){
  feed.style.display="none";
  discover.style.display="block";
  messages.style.display="none";
  profile.style.display="none";
  loadUsers();
}

function showMessages(){
  feed.style.display="none";
  discover.style.display="none";
  messages.style.display="block";
  profile.style.display="none";
}

function showProfile(){
  feed.style.display="none";
  discover.style.display="none";
  messages.style.display="none";
  profile.style.display="block";
  loadProfile();
}

// INIT
loadFeed();

</script>

</body>
</html>
