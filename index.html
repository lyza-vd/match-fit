<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:black;
  color:white;
}

/* FEED */
.post {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
img { width:100%; border-radius:10px; }

/* NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* SWIPE CARD */
.card {
  width:90%;
  margin:auto;
  background:white;
  padding:20px;
  text-align:center;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <button onclick="logout()">⚙️</button>
</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Mot de passe"><br>
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- FEED -->
  <div id="feed"></div>

  <!-- SWIPE -->
  <div id="discover" style="display:none">
    <div class="card" id="card"></div>
    <button onclick="likeUser()">❤️</button>
    <button onclick="skipUser()">❌</button>
  </div>

  <!-- MESSAGES -->
  <div id="messages" style="display:none">
    <div id="chat"></div>
    <input id="msg">
    <button onclick="sendMsg()">Envoyer</button>
  </div>

  <!-- POST -->
  <input id="imgUrl" placeholder="URL image">
  <button onclick="post()">Publier</button>

</div>

<!-- NAV -->
<div class="bottom">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showDiscover()">🔍</button>
  <button onclick="showMessages()">💬</button>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){
  auth.signOut();
}

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    loadFeed();
    loadUsers();
  }
});

// FEED
function loadFeed(){
  db.collection("posts").onSnapshot(snap=>{
    feed.innerHTML="";
    snap.forEach(doc=>{
      let p = doc.data();
      feed.innerHTML += `
        <div class="post">
          <b>${p.user}</b>
          <img src="${p.img}">
          <button onclick="likePost('${doc.id}', ${p.likes})">❤️ ${p.likes}</button>
        </div>`;
    });
  });
}

// POST
function post(){
  db.collection("posts").add({
    user: auth.currentUser.email,
    img: imgUrl.value,
    likes: 0
  });
}

// LIKE POST
function likePost(id, likes){
  db.collection("posts").doc(id).update({likes: likes + 1});
}

// SWIPE SYSTEM
let users = [];
let index = 0;

function loadUsers(){
  db.collection("users").get().then(snap=>{
    users = [];
    snap.forEach(doc=> users.push(doc.data()));
    showUser();
  });
}

function showUser(){
  if(users.length === 0) return;
  card.innerHTML = users[index].email;
}

function likeUser(){
  db.collection("matches").add({
    from: auth.currentUser.email,
    to: users[index].email
  });
  nextUser();
}

function skipUser(){
  nextUser();
}

function nextUser(){
  index++;
  if(index >= users.length) index = 0;
  showUser();
}

// MESSAGES
function sendMsg(){
  db.collection("messages").add({
    text: msg.value,
    user: auth.currentUser.email
  });
}

db.collection("messages").onSnapshot(snap=>{
  chat.innerHTML="";
  snap.forEach(doc=>{
    chat.innerHTML += "<p>"+doc.data().user+": "+doc.data().text+"</p>";
  });
});

// NAVIGATION
function showFeed(){
  feed.style.display="block";
  discover.style.display="none";
  messages.style.display="none";
}

function showDiscover(){
  feed.style.display="none";
  discover.style.display="block";
  messages.style.display="none";
}

function showMessages(){
  feed.style.display="none";
  discover.style.display="none";
  messages.style.display="block";
}

</script>

</body>
</html>
