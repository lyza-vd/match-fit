<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* HEADER */
header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* AUTH BOX */
#auth {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:80vh;
}

#auth input {
  margin:5px;
  padding:10px;
  width:250px;
}

#auth button {
  margin:5px;
  padding:10px;
  width:260px;
  background:black;
  color:white;
  border:none;
}

/* APP */
#app {
  display:none;
}

/* UPLOAD */
.upload {
  padding:10px;
  background:white;
}

/* POSTS */
.post {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}

.post img {
  width:100%;
}

.post p {
  padding:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

.nav button {
  background:none;
  border:none;
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <button onclick="logout()">⚙️</button>
</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app">

  <div class="upload">
    <input type="file" id="fileInput">
    <button onclick="upload()">Publier</button>
  </div>

  <div id="feed"></div>

  <div id="myPosts" style="display:none"></div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showProfile()">👤</button>
</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){
  auth.signOut();
}

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadFeed();
    loadMyPosts();
  }
});

// UPLOAD
function upload(){
  const file = fileInput.files[0];
  if(!file) return alert("Choisis une image");

  const ref = storage.ref("posts/" + Date.now());

  ref.put(file).then(snap=>{
    snap.ref.getDownloadURL().then(url=>{
      db.collection("posts").add({
        user: auth.currentUser.uid,
        email: auth.currentUser.email,
        img: url,
        createdAt: Date.now()
      });
    });
  });
}

// FEED
function loadFeed(){
  db.collection("posts").orderBy("createdAt","desc")
  .onSnapshot(snap=>{
    feed.innerHTML="";
    snap.forEach(doc=>{
      let p = doc.data();

      feed.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <p>${p.email}</p>
        </div>
      `;
    });
  });
}

// PROFILE
function loadMyPosts(){
  db.collection("posts")
  .where("user","==", auth.currentUser.uid)
  .onSnapshot(snap=>{
    myPosts.innerHTML="";
    snap.forEach(doc=>{
      let p = doc.data();

      myPosts.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <button onclick="deletePost('${doc.id}')">Supprimer</button>
        </div>
      `;
    });
  });
}

// DELETE
function deletePost(id){
  db.collection("posts").doc(id).delete();
}

// NAV
function showFeed(){
  feed.style.display="block";
  myPosts.style.display="none";
}

function showProfile(){
  feed.style.display="none";
  myPosts.style.display="block";
}

</script>

</body>
</html>
