<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fafafa;
}

/* HEADER */
header {
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:12px;
  background:white;
}

.story {
  width:65px;
  flex-shrink:0;
  text-align:center;
}

.story img {
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
}

/* POSTS */
.post {
  background:white;
  margin-bottom:12px;
}

.post-header {
  display:flex;
  align-items:center;
  padding:8px;
  gap:8px;
}

.post-header img {
  width:30px;
  height:30px;
  border-radius:50%;
}

/* DM LIST */
.dm-list {
  background:white;
}

.dm-item {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.dm-item img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* CHAT */
.chat {
  display:flex;
  flex-direction:column;
  height:calc(100vh - 120px);
}

.messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:5px 0;
}

.me {
  text-align:right;
}

.input {
  display:flex;
  border-top:1px solid #ddd;
}

.input input {
  flex:1;
  padding:10px;
  border:none;
}

.input button {
  padding:10px;
  border:none;
  background:#0095f6;
  color:white;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

/* SECTIONS */
.section { display:none; padding-bottom:60px; }
.active { display:block; }
</style>
</head>

<body>

<header>
  <b>MatchFit</b>
  <span onclick="navigate('messages')">✉️</span>
</header>

<div id="feed" class="section active"></div>
<div id="messages" class="section"></div>

<div class="nav">
  <div onclick="navigate('feed')">🏠</div>
  <div onclick="navigate('messages')">💬</div>
</div>

<script>

// DATA
const users = [
  {name:"Sophie", photo:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74"},
  {name:"Alex", photo:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438"},
  {name:"Laura", photo:"https://images.unsplash.com/photo-1506126613408-eca07ce68773"}
];

// STOCKAGE MESSAGES
let conversations = {
  Sophie: ["Salut 👋"],
  Alex: ["Yo 💪"],
  Laura: ["Namaste 🧘‍♀️"]
};

let currentChat = null;

// FEED
function renderFeed(){
  let html = `<div class="stories">`;

  users.forEach(u=>{
    html += `
      <div class="story">
        <img src="${u.photo}">
        <p>${u.name}</p>
      </div>
    `;
  });

  html += `</div>`;

  users.forEach(u=>{
    html += `
      <div class="post">
        <div class="post-header">
          <img src="${u.photo}">
          <b>${u.name}</b>
        </div>
        <img src="${u.photo}">
      </div>
    `;
  });

  feed.innerHTML = html;
}

// LISTE DM
function renderDMList(){
  let html = `<div class="dm-list">`;

  users.forEach(u=>{
    html += `
      <div class="dm-item" onclick="openChat('${u.name}')">
        <img src="${u.photo}">
        <b>${u.name}</b>
      </div>
    `;
  });

  html += `</div>`;

  messages.innerHTML = html;
}

// OUVRIR CHAT
function openChat(name){
  currentChat = name;

  messages.innerHTML = `
    <div class="chat">
      <div class="messages" id="chatBox"></div>

      <div class="input">
        <input id="msgInput" placeholder="Message...">
        <button onclick="sendMsg()">Envoyer</button>
      </div>
    </div>
  `;

  renderChat();
}

// AFFICHER MESSAGES
function renderChat(){
  let html = "";

  conversations[currentChat].forEach(m=>{
    let cls = m.startsWith("Moi:") ? "msg me" : "msg";
    html += `<div class="${cls}">${m}</div>`;
  });

  chatBox.innerHTML = html;
}

// ENVOYER MESSAGE
function sendMsg(){
  let input = document.getElementById("msgInput");
  if(input.value.trim() === "") return;

  conversations[currentChat].push("Moi: " + input.value);
  input.value = "";

  renderChat();
}

// NAV
function navigate(section){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(section).classList.add("active");

  if(section === "feed") renderFeed();
  if(section === "messages") renderDMList();
}

// INIT
renderFeed();

</script>

</body>
</html>
