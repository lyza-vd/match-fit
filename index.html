<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }

header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.post {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}

.post img { width:100%; }

.post p { padding:10px; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* SETTINGS MODAL */
#settings {
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:100%;
  background:white;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input {
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <button onclick="openSettings()">⚙️</button>
</header>

<!-- FEED -->
<div id="feed"></div>

<!-- NAV -->
<div class="nav">
  <button onclick="upload()">➕</button>
</div>

<!-- SETTINGS -->
<div id="settings">
  <h2>Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
  <button onclick="closeSettings()">Fermer</button>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// FEED
function loadFeed(){
  db.collection("posts").onSnapshot(snap=>{

    // SI VIDE → FAKE
    if(snap.empty){
      feed.innerHTML = `
        <div class="post">
          <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">
          <p>Sophie - Running</p>
        </div>
        <div class="post">
          <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
          <p>Alex - Musculation</p>
        </div>
      `;
      return;
    }

    feed.innerHTML = "";
    snap.forEach(doc=>{
      let p = doc.data();
      feed.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <p>${p.email}</p>
        </div>
      `;
    });
  });
}

// UPLOAD
function upload(){
  if(!auth.currentUser){
    alert("Connecte-toi dans les paramètres");
    openSettings();
    return;
  }

  const input = document.createElement("input");
  input.type = "file";

  input.onchange = e => {
    const file = e.target.files[0];
    const ref = storage.ref("posts/" + Date.now());

    ref.put(file).then(snap=>{
      snap.ref.getDownloadURL().then(url=>{
        db.collection("posts").add({
          user: auth.currentUser.uid,
          email: auth.currentUser.email,
          img: url,
          createdAt: Date.now()
        });
      });
    });
  };

  input.click();
}

// SETTINGS
function openSettings(){
  settings.style.display = "flex";
}

function closeSettings(){
  settings.style.display = "none";
}

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=> closeSettings());
}

// INIT
loadFeed();

</script>

</body>
</html>
