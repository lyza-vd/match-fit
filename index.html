<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h2 { margin:0; }

/* POSTS & CARDS */
.post, .card {
  background:white;
  margin:10px;
  border-radius:10px;
  padding:10px;
}

img {
  width:100%;
  border-radius:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

button {
  padding:10px;
  border:none;
  background:#111;
  color:white;
  border-radius:5px;
}

/* SECTIONS */
#discover, #messages, #profile {
  display:none;
}
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <span>🔥</span>
</header>

<!-- FEED -->
<div id="feed"></div>

<!-- SWIPE -->
<div id="discover" style="text-align:center;">
  <div id="card" class="card"></div>
  <button onclick="likeUser()">❤️</button>
  <button onclick="skipUser()">❌</button>
</div>

<!-- MESSAGES -->
<div id="messages">
  <div id="chat"></div>
  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>
</div>

<!-- PROFILE -->
<div id="profile">
  <h3 style="padding:10px;">Mon profil</h3>
  <div id="myPosts"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showDiscover()">🔥</button>
  <button onclick="showMessages()">💬</button>
  <button onclick="showProfile()">👤</button>
</div>

<script>

// ================= FEED =================
feed.innerHTML = `
<div class="post">
  <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">
  <p><b>Sophie</b> • Running 🏃‍♀️</p>
</div>

<div class="post">
  <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
  <p><b>Alex</b> • Musculation 💪</p>
</div>

<div class="post">
  <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773">
  <p><b>Laura</b> • Yoga 🧘‍♀️</p>
</div>
`;

// ================= SWIPE =================
let users = [
  {name:"Sophie", sport:"Running", photo:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74"},
  {name:"Alex", sport:"Musculation", photo:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438"},
  {name:"Laura", sport:"Yoga", photo:"https://images.unsplash.com/photo-1506126613408-eca07ce68773"}
];

let index = 0;

function showUser(){
  let u = users[index];

  card.innerHTML = `
    <img src="${u.photo}">
    <h2>${u.name}</h2>
    <p>${u.sport}</p>
  `;
}

function likeUser(){
  alert("🔥 MATCH avec " + users[index].name);
  nextUser();
}

function skipUser(){
  nextUser();
}

function nextUser(){
  index++;
  if(index >= users.length) index = 0;
  showUser();
}

// ================= MESSAGES =================
chat.innerHTML = `
<p><b>Sophie :</b> Salut 👋</p>
<p><b>Toi :</b> Salut ! Tu fais quoi comme sport ?</p>
<p><b>Sophie :</b> Running 🏃‍♀️</p>
`;

function sendMsg(){
  if(msg.value.trim() === "") return;

  chat.innerHTML += `<p><b>Toi :</b> ${msg.value}</p>`;
  msg.value = "";
}

// ================= PROFILE =================
myPosts.innerHTML = `
<div class="post">
  <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
  <p>Mon entraînement 💪</p>
</div>

<div class="post">
  <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">
  <p>Running du matin 🏃</p>
</div>
`;

// ================= NAVIGATION =================
function showFeed(){
  feed.style.display="block";
  discover.style.display="none";
  messages.style.display="none";
  profile.style.display="none";
}

function showDiscover(){
  feed.style.display="none";
  discover.style.display="block";
  messages.style.display="none";
  profile.style.display="none";
  showUser();
}

function showMessages(){
  feed.style.display="none";
  discover.style.display="none";
  messages.style.display="block";
  profile.style.display="none";
}

function showProfile(){
  feed.style.display="none";
  discover.style.display="none";
  messages.style.display="none";
  profile.style.display="block";
}

// INIT
showFeed();

</script>

</body>
</html>
