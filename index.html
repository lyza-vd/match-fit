<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fafafa;
}

/* HEADER */
header {
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-weight:bold;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.story {
  min-width:70px;
  text-align:center;
}

.story img {
  width:65px;
  height:65px;
  border-radius:50%;
  border:2px solid #ff4d6d;
  object-fit:cover;
}

/* POSTS */
.post {
  background:white;
  margin-bottom:10px;
}

.post-header {
  display:flex;
  align-items:center;
  padding:10px;
  gap:10px;
}

.post-header img {
  width:40px; /* ✅ taille réduite comme Instagram */
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.post img {
  width:100%;
  object-fit:cover;
}

/* ACTIONS */
.post-actions {
  padding:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

button {
  background:none;
  border:none;
  font-size:20px;
}

/* SECTIONS */
.section {
  display:none;
  padding-bottom:60px;
}

.active {
  display:block;
}
</style>
</head>

<body>

<header>MatchFit</header>

<!-- FEED -->
<div id="feed" class="section active"></div>

<!-- DISCOVER -->
<div id="discover" class="section" style="text-align:center;"></div>

<!-- MESSAGES -->
<div id="messages" class="section"></div>

<!-- PROFILE -->
<div id="profile" class="section"></div>

<!-- NAV -->
<div class="nav">
  <button onclick="navigate('feed')">🏠</button>
  <button onclick="navigate('discover')">🔥</button>
  <button onclick="navigate('messages')">💬</button>
  <button onclick="navigate('profile')">👤</button>
</div>

<script>

// ================= DATA =================
const users = [
  {name:"Sophie", sport:"Running", photo:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74"},
  {name:"Alex", sport:"Musculation", photo:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438"},
  {name:"Laura", sport:"Yoga", photo:"https://images.unsplash.com/photo-1506126613408-eca07ce68773"}
];

// ================= FEED =================
function renderFeed(){
  let html = `<div class="stories">`;

  users.forEach(u=>{
    html += `
      <div class="story">
        <img src="${u.photo}">
        <p>${u.name}</p>
      </div>
    `;
  });

  html += `</div>`;

  users.forEach(u=>{
    html += `
      <div class="post">
        <div class="post-header">
          <img src="${u.photo}">
          <b>${u.name}</b>
        </div>
        <img src="${u.photo}">
        <div class="post-actions">
          ❤️ 💬 🔥
          <p>${u.sport}</p>
        </div>
      </div>
    `;
  });

  feed.innerHTML = html;
}

// ================= DISCOVER =================
let index = 0;

function renderDiscover(){
  let u = users[index];

  discover.innerHTML = `
    <img src="${u.photo}" style="width:80%; border-radius:10px;">
    <h2>${u.name}</h2>
    <p>${u.sport}</p>
    <button onclick="likeUser()">❤️</button>
    <button onclick="nextUser()">❌</button>
  `;
}

function likeUser(){
  alert("🔥 MATCH avec " + users[index].name);
  nextUser();
}

function nextUser(){
  index = (index + 1) % users.length;
  renderDiscover();
}

// ================= MESSAGES =================
function renderMessages(){
  messages.innerHTML = `
    <p><b>Sophie :</b> Salut 👋</p>
    <input id="msg">
    <button onclick="sendMsg()">Envoyer</button>
    <div id="chat"></div>
  `;
}

function sendMsg(){
  let input = document.getElementById("msg");
  if(input.value.trim() === "") return;

  chat.innerHTML += `<p><b>Toi :</b> ${input.value}</p>`;
  input.value = "";
}

// ================= PROFILE =================
function renderProfile(){
  profile.innerHTML = `
    <h3>Mon profil</h3>
    <img src="${users[1].photo}" style="width:100px;border-radius:50%;object-fit:cover;">
    <p>Sportif 💪</p>
  `;
}

// ================= NAVIGATION =================
function navigate(section){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(section).classList.add("active");

  if(section === "feed") renderFeed();
  if(section === "discover") renderDiscover();
  if(section === "messages") renderMessages();
  if(section === "profile") renderProfile();
}

// INIT
renderFeed();

</script>

</body>
</html>
