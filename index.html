<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }

/* LOGIN */
#auth {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#auth input {
  margin:5px;
  padding:10px;
  width:250px;
}

#auth button {
  margin:5px;
  padding:10px;
  width:260px;
  background:black;
  color:white;
  border:none;
}

/* APP */
#app { display:none; }

/* HEADER */
header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* POST */
.post {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}

.post img { width:100%; }

.post p { padding:10px; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h1>MatchFit</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app">

<header>
  <h2>MatchFit</h2>
  <button onclick="logout()">⚙️</button>
</header>

<div id="feed"></div>

</div>

<div class="nav">
  <button>🏠</button>
</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){
  auth.signOut();
}

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadFeed();
  } else {
    document.getElementById("auth").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// FEED
function loadFeed(){
  db.collection("posts").onSnapshot(snap=>{
    
    // 🔥 SI VIDE → FAKE POSTS
    if(snap.empty){
      feed.innerHTML = `
        <div class="post">
          <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">
          <p>Sophie - Running</p>
        </div>
        <div class="post">
          <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
          <p>Alex - Musculation</p>
        </div>
      `;
      return;
    }

    // 🔥 POSTS RÉELS
    feed.innerHTML = "";
    snap.forEach(doc=>{
      let p = doc.data();

      feed.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <p>${p.email}</p>
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
