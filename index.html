<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fafafa;
}

/* HEADER */
header {
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:bold;
  font-size:20px;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:12px;
  background:white;
  border-bottom:1px solid #ddd;
}

.story {
  width:65px;
  flex-shrink:0;
  text-align:center;
  cursor:pointer;
}

.story img {
  width:55px;
  height:55px;
  border-radius:50%;
  padding:2px;
  background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
  object-fit:cover;
  display:block;
  margin:0 auto;
}

.story p {
  font-size:11px;
  margin-top:5px;
}

/* empêche les zones de hover bizarres */
.story * {
  pointer-events:none;
}

/* POSTS */
.post {
  background:white;
  margin-bottom:12px;
}

.post-header {
  display:flex;
  align-items:center;
  padding:8px 10px;
  gap:8px;
}

.post-header img {
  width:30px;        /* petit comme Insta */
  height:30px;
  border-radius:50%;
  object-fit:cover;
}

.post img {
  width:100%;
  object-fit:cover;
}

/* ACTIONS */
.post-actions {
  padding:10px;
  font-size:20px;
}

.post-actions span {
  margin-right:12px;
  cursor:pointer;
}

.post-caption {
  padding:0 10px 10px;
  font-size:14px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
  font-size:20px;
}

/* SECTIONS */
.section {
  display:none;
  padding-bottom:60px;
}

.active {
  display:block;
}
</style>
</head>

<body>

<header>
  <div class="logo">MatchFit</div>
  <div>✉️</div>
</header>

<div id="feed" class="section active"></div>

<div class="nav">
  <div onclick="navigate('feed')">🏠</div>
  <div>🔍</div>
  <div>➕</div>
  <div>👤</div>
</div>

<script>

// DATA
const users = [
  {name:"Sophie", sport:"Running 🏃‍♀️", photo:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74"},
  {name:"Alex", sport:"Muscu 💪", photo:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438"},
  {name:"Laura", sport:"Yoga 🧘‍♀️", photo:"https://images.unsplash.com/photo-1506126613408-eca07ce68773"}
];

// FEED
function renderFeed(){
  let html = `<div class="stories">`;

  users.forEach(u=>{
    html += `
      <div class="story">
        <img src="${u.photo}">
        <p>${u.name}</p>
      </div>
    `;
  });

  html += `</div>`;

  users.forEach(u=>{
    html += `
      <div class="post">
        <div class="post-header">
          <img src="${u.photo}">
          <b>${u.name}</b>
        </div>

        <img src="${u.photo}">

        <div class="post-actions">
          <span>❤️</span>
          <span>💬</span>
          <span>📤</span>
        </div>

        <div class="post-caption">
          <b>${u.name}</b> ${u.sport}
        </div>
      </div>
    `;
  });

  feed.innerHTML = html;
}

// NAV
function navigate(section){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(section)?.classList.add("active");
}

// INIT
renderFeed();

</script>

</body>
</html>
