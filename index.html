<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }

header {
  background:#111; color:white;
  display:flex; justify-content:space-between;
  padding:15px;
}

.post {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

img { width:100%; border-radius:10px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button { padding:5px 10px; }
</style>
</head>

<body>

<header>
  <h2>MatchFit</h2>
  <button onclick="logout()">⚙️</button>
</header>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Mot de passe"><br>
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- UPLOAD -->
  <h3>Publier</h3>
  <input type="file" id="fileInput">
  <button onclick="upload()">Publier</button>

  <!-- PROFIL -->
  <h3>Mon profil</h3>
  <div id="myPosts"></div>

  <!-- FEED -->
  <h3>Feed</h3>
  <div id="feed"></div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showProfile()">👤</button>
</div>

<script>

// 🔥 CONFIG FIREBASE (REMPLACE)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){
  auth.signOut();
}

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    loadFeed();
    loadMyPosts();
  }
});

// UPLOAD IMAGE
function upload(){
  const file = fileInput.files[0];
  if(!file) return alert("Choisis une image");

  const refStorage = storage.ref("posts/" + Date.now());

  refStorage.put(file).then(snapshot=>{
    snapshot.ref.getDownloadURL().then(url=>{
      db.collection("posts").add({
        user: auth.currentUser.uid,
        email: auth.currentUser.email,
        img: url,
        createdAt: Date.now()
      });
    });
  });
}

// FEED GLOBAL
function loadFeed(){
  db.collection("posts").orderBy("createdAt","desc")
  .onSnapshot(snap=>{
    feed.innerHTML = "";
    snap.forEach(doc=>{
      let p = doc.data();

      feed.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <p>${p.email}</p>
        </div>
      `;
    });
  });
}

// MES POSTS
function loadMyPosts(){
  db.collection("posts")
  .where("user","==", auth.currentUser.uid)
  .onSnapshot(snap=>{
    myPosts.innerHTML = "";
    snap.forEach(doc=>{
      let p = doc.data();

      myPosts.innerHTML += `
        <div class="post">
          <img src="${p.img}">
          <button onclick="deletePost('${doc.id}')">Supprimer</button>
        </div>
      `;
    });
  });
}

// DELETE POST
function deletePost(id){
  db.collection("posts").doc(id).delete();
}

// NAV
function showFeed(){
  feed.style.display="block";
  myPosts.style.display="none";
}

function showProfile(){
  feed.style.display="none";
  myPosts.style.display="block";
}

</script>

</body>
</html>
