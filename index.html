<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchFit</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f2f2f2;
}

/* HEADER */
header {
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

header h1 {
  margin:0;
  font-size:24px;
}

header span {
  font-size:20px;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  background:white;
}

.story {
  text-align:center;
  margin-right:10px;
}

.story img {
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid orange;
}

/* FEED */
.feed {
  padding-bottom:80px;
}

.post {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}

.post-header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

.user {
  display:flex;
  align-items:center;
}

.user img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

.post img {
  width:100%;
}

.actions {
  display:flex;
  gap:15px;
  padding:10px;
  font-size:20px;
}

/* NAVBAR */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 0;
  border-top:1px solid #ddd;
}

.publish {
  background:orange;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  margin-top:-30px;
  color:white;
}
</style>
</head>

<body>

<header>
  <span>🏠</span>
  <h1>MatchFit</h1>
  <span>⚙️</span>
</header>

<!-- STORIES -->
<div class="stories">
  <div class="story">
    <img src="https://via.placeholder.com/60">
    <div>Vous</div>
  </div>
  <div class="story">
    <img src="https://via.placeholder.com/60">
    <div>Alex</div>
  </div>
  <div class="story">
    <img src="https://via.placeholder.com/60">
    <div>Laura</div>
  </div>
</div>

<!-- FEED -->
<div class="feed">

  <div class="post">
    <div class="post-header">
      <div class="user">
        <img src="https://via.placeholder.com/40">
        <div>
          <strong>Sophie_74</strong><br>
          <small>Fitness & Running</small>
        </div>
      </div>
      <button>S'abonner</button>
    </div>

    <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">

    <div class="actions">
      ❤️ 💬 🔗
    </div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div>🔍</div>
  <div class="publish">+</div>
  <div>💬</div>
</div>

</body>
</html>
